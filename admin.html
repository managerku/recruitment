<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; overflow-x: hidden; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .toggle-checkbox:checked { right: 0; border-color: #10B981; }
    .toggle-checkbox:checked + .toggle-label { background-color: #10B981; }
  </style>
</head>

<body class="text-gray-900 antialiased selection:bg-red-200 selection:text-red-900">
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useEffect } = React;

    // =====================================================
    // CONFIG API GAS
    // Ganti dengan URL deployment Apps Script lu yang berakhiran /exec
    // =====================================================
    const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbxMJLyiR-tYGsm8BVYfjTiZQNIf-umqVsjvHNYJAHnSMGip9pbTQxdvU2M1bbph4009Ug/exec';

    // Link public GitHub Pages lu.
    // Ini dipakai di pesan WhatsApp ke kandidat.
    const PUBLIC_PORTAL_URL = 'https://USERNAME.github.io/NAMA_REPO/';

    // Nama file route lokal GitHub
    const INDEX_PAGE = 'index.html';

    // =====================================================
    // API HELPER UNTUK FRONTEND GITHUB
    // Semua request ke Code.gs doPost lewat helper ini.
    // Content-Type text/plain dipakai supaya aman dari preflight CORS.
    // =====================================================
    async function apiCall(action, payload = {}) {
      try {
        const response = await fetch(GAS_API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'text/plain;charset=utf-8'
          },
          body: JSON.stringify({
            action,
            payload
          })
        });

        const text = await response.text();

        try {
          return JSON.parse(text);
        } catch (parseError) {
          return {
            success: false,
            message: 'Response server bukan JSON valid: ' + text
          };
        }

      } catch (error) {
        return {
          success: false,
          message: 'Gagal terhubung ke server: ' + error.message
        };
      }
    }

    function AdminDashboard() {
      // --- STATE UTAMA ---
      const [isSidebarOpen, setIsSidebarOpen] = useState(true);
      const [activeTab, setActiveTab] = useState('dashboard'); 
      const [applicants, setApplicants] = useState([]);
      const [isLoadingData, setIsLoadingData] = useState(true);
      const [filterStatus, setFilterStatus] = useState('Semua');
      const [selectedDetail, setSelectedDetail] = useState(null);

      // --- STATE LIVE EDIT STATUS ---
      const [updatingIds, setUpdatingIds] = useState({});

      const [interviewModal, setInterviewModal] = useState({ 
        isOpen: false,
        app: null,
        type: 'online',
        datetime: '',
        location: ''
      });

      // --- STATE FORM BUILDER ---
      const [formFields, setFormFields] = useState([]);
      const [isLoadingSettings, setIsLoadingSettings] = useState(true);
      const [isSaving, setIsSaving] = useState(false);

      // --- STATE PENILAIAN KOGNITIF ---
      const [kognitifQuestions, setKognitifQuestions] = useState([]);
      const [isLoadingKognitif, setIsLoadingKognitif] = useState(true);
      const [isSavingKognitif, setIsSavingKognitif] = useState(false);

      const [kognitifTab, setKognitifTab] = useState('soal'); 
      
      const [passingGrade, setPassingGrade] = useState({
        rekomen: 60,
        sangatRekomen: 85
      });
      const [isSavingGrade, setIsSavingGrade] = useState(false);
      
      const [hasilJawaban, setHasilJawaban] = useState([]);
      const [hasilHeaders, setHasilHeaders] = useState([]);
      const [isLoadingHasil, setIsLoadingHasil] = useState(true);

      // --- STATE INTERVIEW ---
      const [interviewQuestions, setInterviewQuestions] = useState([]);
      const [isLoadingInterview, setIsLoadingInterview] = useState(true);
      const [isSavingInterview, setIsSavingInterview] = useState(false);
      const [gradingModal, setGradingModal] = useState({
        isOpen: false,
        app: null,
        answers: {}
      });
      const [isSubmittingGrade, setIsSubmittingGrade] = useState(false);
      const [interviewTab, setInterviewTab] = useState('soal');
      const [interviewResults, setInterviewResults] = useState([]);

      // --- STATE ONBOARDING ---
      const [onboardingTab, setOnboardingTab] = useState('editor');
      const [clauses, setClauses] = useState([]);
      const [signedList, setSignedList] = useState([]);
      const [isSavingClause, setIsSavingClause] = useState(false);
      
      // --- STATE POP-UP CUSTOM ---
      const [dialog, setDialog] = useState({
        isOpen: false,
        type: 'alert',
        title: '',
        message: '',
        onConfirm: null
      });

      useEffect(() => {
        const isAdminLoggedIn = localStorage.getItem('admin_login_active');

        if (isAdminLoggedIn !== 'true') {
          alert('Sesi admin tidak valid. Silakan login kembali.');
          window.location.href = INDEX_PAGE;
          return;
        }

        fetchData();
        fetchFormSettings();
        fetchKognitifQuestions();
        fetchPassingGrade();
        fetchHasilJawaban();
        fetchInterviewQuestions();
        fetchOnboardingData(); 
        fetchInterviewResults();
      }, []);

      const fetchData = async () => {
        setIsLoadingData(true);

        const res = await apiCall('getApplicantsData');

        if (res.success) {
          setApplicants(res.data);
        } else {
          alert('Peringatan: ' + res.message);
        }

        setIsLoadingData(false);
      };

      const fetchFormSettings = async () => {
        setIsLoadingSettings(true);

        const res = await apiCall('getFormSettings');

        if (res.success) {
          setFormFields(res.data);
        }

        setIsLoadingSettings(false);
      };

      const fetchKognitifQuestions = async () => {
        setIsLoadingKognitif(true);

        const res = await apiCall('getKognitifQuestions');

        if (res.success) {
          setKognitifQuestions(res.data);
        }

        setIsLoadingKognitif(false);
      };

      const fetchPassingGrade = async () => {
        const res = await apiCall('getPassingGrade');

        if (res.success) {
          setPassingGrade(res.data);
        }
      };

      const fetchHasilJawaban = async () => {
        setIsLoadingHasil(true);

        const res = await apiCall('getHasilJawaban');

        if (res.success) {
          setHasilJawaban(res.data);
          setHasilHeaders(res.headers);
        }

        setIsLoadingHasil(false);
      };

      const handleSavePassingGrade = async () => {
        setIsSavingGrade(true);

        const res = await apiCall('savePassingGrade', {
          gradeData: passingGrade
        });

        if (res.success) {
          setDialog({
            isOpen: true,
            type: 'success',
            title: 'Berhasil',
            message: 'Passing Grade berhasil diperbarui!'
          });
        } else {
          setDialog({
            isOpen: true,
            type: 'alert',
            title: 'Gagal',
            message: res.message
          });
        }

        setIsSavingGrade(false);
      };

      const executeStatusUpdate = async (id, newStatus) => {
        const updatedApp = applicants.map(app => {
          if ((app['ID Pelamar'] || app.id) === id) {
            return {
              ...app,
              Status: newStatus
            };
          }

          return app;
        });

        setApplicants(updatedApp);
        setUpdatingIds(prev => ({
          ...prev,
          [id]: true
        }));

        const res = await apiCall('updateApplicantStatus', {
          applicantId: id,
          newStatus
        });

        setUpdatingIds(prev => ({
          ...prev,
          [id]: false
        }));

        if (!res.success) {
          setDialog({
            isOpen: true,
            type: 'alert',
            title: 'Gagal',
            message: res.message
          });

          fetchData();
        }
      };

      const handleStatusChange = (app, newStatus) => {
        const id = app['ID Pelamar'] || app.id;

        if (newStatus === 'Wawancara') {
          setInterviewModal({
            isOpen: true,
            app: app,
            type: 'online',
            datetime: '',
            location: ''
          });
        } else {
          executeStatusUpdate(id, newStatus);
        }
      };

      const handleSendInterview = () => {
        const { app, type, datetime, location } = interviewModal;
        const id = app['ID Pelamar'] || app.id;
        const nama = app['Nama'] || app.name || 'Kandidat';
        const noWa = app['NoWA'] || app['No. WhatsApp'] || app.wa;

        executeStatusUpdate(id, 'Wawancara');

        if (noWa) {
          let formattedNo = noWa.toString().replace(/\D/g, '');

          if (formattedNo.startsWith('0')) {
            formattedNo = '62' + formattedNo.substring(1);
          }

          const formatTanggal = datetime
            ? new Date(datetime).toLocaleString('id-ID', {
                dateStyle: 'full',
                timeStyle: 'short'
              })
            : '[Tanggal Belum Ditentukan]';

          let message = `Halo ${nama}, selamat! Anda lolos ke tahap Wawancara.\n\nJadwal Anda: *${formatTanggal} WIB*\n`;

          if (type === 'online') {
            message += `Format: *Online (Google Meet)*\n🌐 Link Meeting: ${location}\n\n`;
          } else {
            message += `Format: *Tatap Muka (Offline)*\n🏢 Lokasi/Alamat: ${location}\n\n`;
          }

          message += `Harap konfirmasi kehadiran Anda dengan membalas pesan ini. Terima kasih.`;

          window.open(`https://wa.me/${formattedNo}?text=${encodeURIComponent(message)}`, '_blank');
        } else {
          setDialog({
            isOpen: true,
            type: 'alert',
            title: 'Peringatan',
            message: 'Status diubah, tapi pelamar ini tidak memiliki Nomor WA valid.'
          });
        }

        setInterviewModal({
          isOpen: false,
          app: null,
          type: 'online',
          datetime: '',
          location: ''
        });
      };

      const getStatusColorClass = (status) => {
        switch(status) {
          case 'Baru': return 'bg-blue-50 text-blue-700 border-blue-200';
          case 'Penilaian Cognitive': return 'bg-purple-50 text-purple-700 border-purple-200';
          case 'Selesai Test Kognitif': return 'bg-indigo-100 text-indigo-800 border-indigo-300';
          case 'Wawancara': return 'bg-yellow-50 text-yellow-700 border-yellow-200';
          case 'Sudah Wawancara': return 'bg-amber-100 text-amber-800 border-amber-300';
          case 'Onboarding': return 'bg-orange-50 text-orange-700 border-orange-200';
          case 'Active': return 'bg-green-50 text-green-700 border-green-200';
          default: return 'bg-gray-50 text-gray-700 border-gray-200';
        }
      };

      const handleAddField = () => {
        const newId = formFields.length > 0
          ? Math.max(...formFields.map(f => Number(f.id) || 0)) + 1
          : 1;

        setFormFields([
          ...formFields,
          {
            id: newId,
            label: "Input Baru",
            name: "Input" + newId,
            type: "text",
            required: false,
            active: true,
            options: ""
          }
        ]);
      };

      const handleUpdateField = (id, key, value) => {
        setFormFields(formFields.map(field => {
          if (field.id === id) {
            if (key === 'label') {
              return {
                ...field,
                label: value,
                name: value.replace(/[^a-zA-Z0-9]/g, '')
              };
            }

            return {
              ...field,
              [key]: value
            };
          }

          return field;
        }));
      };

      const handleDeleteField = (id) => {
        setDialog({
          isOpen: true,
          type: 'confirm',
          title: 'Hapus Input?',
          message: 'Yakin ingin menghapus input pendaftaran ini?',
          onConfirm: () => setFormFields(formFields.filter(f => f.id !== id))
        });
      };

      const handleSaveFormSettings = async () => {
        setIsSaving(true);

        const res = await apiCall('saveFormSettings', {
          settingsArray: formFields
        });

        if (res.success) {
          setDialog({
            isOpen: true,
            type: 'success',
            title: 'Berhasil',
            message: 'Pengaturan Form berhasil disimpan!'
          });
        } else {
          setDialog({
            isOpen: true,
            type: 'alert',
            title: 'Gagal',
            message: res.message
          });
        }

        setIsSaving(false);
      };

      const handleAddQuestion = () => {
        const newId = kognitifQuestions.length > 0
          ? Math.max(...kognitifQuestions.map(q => Number(q.id) || 0)) + 1
          : 1;

        setKognitifQuestions([
          ...kognitifQuestions,
          {
            id: newId,
            question: "",
            optionA: "",
            optionB: "",
            optionC: "",
            optionD: "",
            scoreA: 1,
            scoreB: 2,
            scoreC: 3,
            scoreD: 4
          }
        ]);
      };

      const handleUpdateQuestion = (id, key, value) => {
        setKognitifQuestions(kognitifQuestions.map(q => (
          q.id === id
            ? {
                ...q,
                [key]: value
              }
            : q
        )));
      };

      const handleDeleteQuestion = (id) => {
        setDialog({
          isOpen: true,
          type: 'confirm',
          title: 'Hapus Soal?',
          message: 'Hapus soal ini dari penilaian kognitif?',
          onConfirm: () => setKognitifQuestions(kognitifQuestions.filter(q => q.id !== id))
        });
      };

      const handleSaveKognitif = async () => {
        setIsSavingKognitif(true);

        const res = await apiCall('saveKognitifQuestions', {
          questions: kognitifQuestions
        });

        if (res.success) {
          setDialog({
            isOpen: true,
            type: 'success',
            title: 'Berhasil',
            message: 'Soal kognitif disimpan ke database!'
          });
        } else {
          setDialog({
            isOpen: true,
            type: 'alert',
            title: 'Gagal',
            message: res.message
          });
        }

        setIsSavingKognitif(false);
      };

      const fetchInterviewQuestions = async () => {
        setIsLoadingInterview(true);

        const res = await apiCall('getInterviewQuestions');

        if (res.success) {
          setInterviewQuestions(res.data);
        }

        setIsLoadingInterview(false);
      };

      const handleAddInterviewQ = () => {
        const newId = interviewQuestions.length > 0
          ? Math.max(...interviewQuestions.map(q => Number(q.id) || 0)) + 1
          : 1;

        setInterviewQuestions([
          ...interviewQuestions,
          {
            id: newId,
            question: "Ketik pertanyaan wawancara baru..."
          }
        ]);
      };

      const handleUpdateInterviewQ = (id, val) => {
        setInterviewQuestions(interviewQuestions.map(q => (
          q.id === id
            ? {
                ...q,
                question: val
              }
            : q
        )));
      };

      const handleDeleteInterviewQ = (id) => {
        setDialog({
          isOpen: true,
          type: 'confirm',
          title: 'Hapus Pertanyaan?',
          message: 'Hapus pertanyaan wawancara ini?',
          onConfirm: () => setInterviewQuestions(interviewQuestions.filter(q => q.id !== id))
        });
      };

      const handleSaveInterviewQs = async () => {
        setIsSavingInterview(true);

        const res = await apiCall('saveInterviewQuestions', {
          questions: interviewQuestions
        });

        if (res.success) {
          setDialog({
            isOpen: true,
            type: 'success',
            title: 'Berhasil',
            message: 'Daftar Pertanyaan Wawancara disimpan!'
          });
        } else {
          setDialog({
            isOpen: true,
            type: 'alert',
            title: 'Gagal',
            message: res.message
          });
        }

        setIsSavingInterview(false);
      };

      const handleOpenGrading = (app) => {
        let initAns = {};

        interviewQuestions.forEach(q => {
          initAns[q.id] = 0;
        });

        setGradingModal({
          isOpen: true,
          app: app,
          answers: initAns
        });
      };

      const fetchInterviewResults = async () => {
        const res = await apiCall('getInterviewResults');

        if (res.success) {
          setInterviewResults(res.data);
        }
      };

      const fetchOnboardingData = async () => {
        const clausesRes = await apiCall('getOnboardingClauses');

        if (clausesRes.success) {
          setClauses(clausesRes.data);
        }

        const signedRes = await apiCall('getOnboardingSignatures');

        if (signedRes.success) {
          setSignedList(signedRes.data);
        }
      };

      const handleScoreChange = (qId, score) => {
        setGradingModal(prev => ({
          ...prev,
          answers: {
            ...prev.answers,
            [qId]: score
          }
        }));
      };

      const handleSubmitGrading = async () => {
        setIsSubmittingGrade(true);

        let total = 0;

        Object.values(gradingModal.answers).forEach(val => {
          total += Number(val) || 0;
        });

        const res = await apiCall('submitInterviewResult', {
          idPelamar: gradingModal.app['ID Pelamar'] || gradingModal.app.id,
          nama: gradingModal.app['Nama'] || gradingModal.app.name,
          posisi: gradingModal.app['Posisi'] || gradingModal.app.posisi,
          totalScore: total,
          detailScores: gradingModal.answers
        });

        setIsSubmittingGrade(false);

        if (res.success) {
          setDialog({
            isOpen: true,
            type: 'success',
            title: 'Nilai Tersimpan!',
            message: `Total Skor Kandidat: ${total}`
          });

          setGradingModal({
            isOpen: false,
            app: null,
            answers: {}
          });

          fetchInterviewResults();
          fetchData();
        } else {
          setDialog({
            isOpen: true,
            type: 'alert',
            title: 'Gagal',
            message: res.message
          });
        }
      };

      const getSafeData = (app) => {
        const rawDate = app['Timestamp'] || app.date;

        return {
          id: app['ID Pelamar'] || app.id || '-',
          date: rawDate ? new Date(rawDate).toLocaleDateString('id-ID') : '-',
          status: app['Status'] || app.status || 'Baru',
          name: app['Nama'] || app.name || 'Tanpa Nama',
          alamat: app['Alamat'] || app.alamat || '-',
          email: app['Email'] || app.email || '-',
          wa: app['NoWA'] || app['No. WhatsApp'] || app.wa || '',
          posisi: app['Posisi'] || app.posisi || '-',
          cv: app['CV'] || app.cvLink || '',
          porto: app['Portofolio'] || app.portofolioLink || ''
        };
      };

      const processedApplicants = applicants.map(getSafeData);
      const activeApplicants = applicants.filter(a => a['ID Pelamar']); 

      const totalPelamar = activeApplicants.length;
      const pelamarBaru = activeApplicants.filter(a => (a['Status'] || 'Baru') === 'Baru').length;
      const sedangDiproses = activeApplicants.filter(a => ['Penilaian Cognitive', 'Wawancara', 'Onboarding'].includes(a['Status'])).length;
      const totalActive = activeApplicants.filter(a => a['Status'] === 'Active').length;

      const filteredApplicants = filterStatus === 'Semua'
        ? activeApplicants
        : activeApplicants.filter(app => (app['Status'] || 'Baru') === filterStatus);

      const handleLogout = () => {
        setDialog({
          isOpen: true,
          type: 'confirm',
          title: 'Keluar Sistem',
          message: 'Yakin ingin keluar dari Dashboard HR?',
          onConfirm: () => {
            localStorage.removeItem('admin_login_active');
            window.location.href = INDEX_PAGE;
          }
        });
      };

      const getWaLink = (noWa, namaPelamar, idPelamar, status) => {
        if (!noWa) return '#';

        let formattedNo = noWa.toString().replace(/\D/g, '');

        if (formattedNo.startsWith('0')) {
          formattedNo = '62' + formattedNo.substring(1);
        }
        
        const webUrl = PUBLIC_PORTAL_URL;
        let message = `Halo ${namaPelamar}, kami dari Tim HRD menindaklanjuti lamaran Anda.`;

        if (status === 'Penilaian Cognitive') {
          message = `Halo ${namaPelamar}, selamat! Anda lolos ke tahap Penilaian Kognitif.\n\nSilakan login ke portal rekrutmen kami untuk mengerjakan tes.\n🌐 Link: ${webUrl}\n🔑 ID Pelamar Anda: *${idPelamar}*\n\nWaktu pengerjaan adalah 30 menit. Harap persiapkan diri Anda.\n\nTerima kasih.`;
        } else if (status === 'Wawancara') {
          message = `Halo ${namaPelamar}, selamat! Anda lolos ke tahap Wawancara. Jadwal detail akan kami informasikan lebih lanjut.`;
        } else if (status === 'Onboarding') {
          message = `Halo ${namaPelamar}, *SELAMAT!* 🎉\n\nAnda dinyatakan lolos seleksi dan masuk ke tahap *Onboarding*.\n\nHarap segera login ke portal untuk meninjau dan menandatangani Surat Perjanjian Kerja digital:\n🌐 Link: ${webUrl}\n🔑 ID Pelamar: *${idPelamar}*\n\nSelamat bergabung di tim kami!`;
        }

        return `https://wa.me/${formattedNo}?text=${encodeURIComponent(message)}`;
      };

      const renderDynamicCell = (app, field) => {
        const val = app[field.name];

        if (val === undefined || val === '') {
          return <span className="text-gray-400 italic text-[10px]">-</span>;
        }

        if (field.type === 'file' || field.type === 'url') {
          if (val.toString().startsWith('http')) {
            return (
              <a
                href={val}
                target="_blank"
                className="inline-block px-3 py-1.5 bg-black text-white rounded text-xs font-semibold hover:bg-red-600 transition shadow-sm"
              >
                Buka Link
              </a>
            );
          }

          return <span className="text-xs text-gray-500">Link Invalid</span>;
        }

        if (field.type === 'tel') {
          const waHref = getWaLink(
            val,
            app['Nama'] || app.name || 'Kandidat',
            app['ID Pelamar'],
            app['Status'] || 'Baru'
          );

          return (
            <div className="flex items-center space-x-2">
              <span className="text-xs font-medium">{val}</span>
              <a href={waHref} target="_blank" title="Chat WA" className="bg-green-500 text-white p-1 rounded hover:bg-green-600 shadow-sm">
                <svg className="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24">
                  <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/>
                </svg>
              </a>
            </div>
          );
        }

        if (field.type === 'textarea') {
          return (
            <div
              className="text-xs line-clamp-2 cursor-pointer hover:text-red-600 w-48 whitespace-normal"
              title="Lihat penuh"
              onClick={() => setSelectedDetail({
                id: app['ID Pelamar'],
                title: field.label,
                content: val
              })}
            >
              {val}
            </div>
          );
        }

        if (field.type === 'select') {
          return <span className="bg-gray-100 text-gray-700 px-2 py-1 rounded text-[11px] font-medium border">{val}</span>;
        }

        return <div className="text-xs font-medium">{val}</div>;
      };

      const CircularProgress = ({ percentage, label, colorClass }) => {
        const sqSize = 80;
        const strokeWidth = 8;
        const radius = (sqSize - strokeWidth) / 2;
        const viewBox = `0 0 ${sqSize} ${sqSize}`;
        const dashArray = radius * Math.PI * 2;
        const dashOffset = dashArray - (dashArray * percentage) / 100;

        return (
          <div className="flex flex-col items-center group cursor-pointer">
            <div className="relative flex items-center justify-center">
              <svg width={sqSize} height={sqSize} viewBox={viewBox} className="transform -rotate-90 drop-shadow-sm">
                <circle className="text-gray-100 stroke-current" strokeWidth={strokeWidth} cx={sqSize / 2} cy={sqSize / 2} r={radius} fill="transparent" />
                <circle className={`${colorClass} stroke-current transition-all duration-1000 ease-out`} strokeWidth={strokeWidth} strokeLinecap="round" strokeDasharray={dashArray} strokeDashoffset={dashOffset} cx={sqSize / 2} cy={sqSize / 2} r={radius} fill="transparent" />
              </svg>
              <div className="absolute text-sm font-black text-gray-800">{percentage}%</div>
            </div>
            <span className="text-[10px] font-bold text-gray-500 mt-3 uppercase tracking-wider group-hover:text-black transition">{label}</span>
          </div>
        );
      };

      const renderDashboard = () => {
        const activeFields = formFields.filter(f => f.active);

        return (
          <div className="animate-[fadeIn_0.3s_ease-out]">
            <div className="mb-8 flex justify-between items-end">
              <div>
                <h2 className="text-2xl font-bold text-gray-800">Overview Rekrutmen</h2>
                <p className="text-sm text-gray-500">Kelola dan update status pelamar real-time.</p>
              </div>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
              <div className="bg-white p-6 rounded-xl shadow-sm border-l-4 border-black">
                <p className="text-sm font-semibold text-gray-500 uppercase">Total Pelamar</p>
                <h3 className="text-3xl font-bold mt-2">{isLoadingData ? '...' : totalPelamar}</h3>
              </div>
              <div className="bg-white p-6 rounded-xl shadow-sm border-l-4 border-blue-500">
                <p className="text-sm font-semibold text-gray-500 uppercase">Pelamar Baru</p>
                <h3 className="text-3xl font-bold text-blue-600 mt-2">{isLoadingData ? '...' : pelamarBaru}</h3>
              </div>
              <div className="bg-white p-6 rounded-xl shadow-sm border-l-4 border-yellow-500">
                <p className="text-sm font-semibold text-gray-500 uppercase">Dalam Proses</p>
                <h3 className="text-3xl font-bold text-yellow-600 mt-2">{isLoadingData ? '...' : sedangDiproses}</h3>
              </div>
              <div className="bg-white p-6 rounded-xl shadow-sm border-l-4 border-green-500">
                <p className="text-sm font-semibold text-gray-500 uppercase">Diterima (Active)</p>
                <h3 className="text-3xl font-bold text-green-600 mt-2">{isLoadingData ? '...' : totalActive}</h3>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
              <div className="p-6 border-b border-gray-100 flex flex-wrap gap-4 justify-between items-center bg-gray-50">
                <h3 className="text-lg font-bold text-gray-800">Daftar Pelamar Terbaru</h3>
                <div className="flex gap-3 items-center">
                  <select value={filterStatus} onChange={(e) => setFilterStatus(e.target.value)} className="border border-gray-300 text-sm rounded-lg outline-none p-2">
                    <option value="Semua">Semua Status</option>
                    <option value="Baru">Status: Baru</option>
                    <option value="Penilaian Cognitive">Status: Penilaian Cognitive</option>
                    <option value="Selesai Test Kognitif">Status: Selesai Test Kognitif</option>
                    <option value="Wawancara">Status: Wawancara</option>
                    <option value="Sudah Wawancara">Status: Sudah Wawancara</option>
                    <option value="Onboarding">Status: Onboarding</option>
                    <option value="Active">Status: Active</option>
                  </select>
                  <button onClick={fetchData} disabled={isLoadingData} className={`px-4 py-2 text-white text-sm font-semibold rounded ${isLoadingData ? 'bg-gray-400' : 'bg-black hover:bg-red-600'}`}>
                    {isLoadingData ? 'Memuat...' : 'Refresh Data'}
                  </button>
                </div>
              </div>
              
              <div className="overflow-x-auto pb-4 min-h-[300px]">
                <table className="w-full text-left border-collapse min-w-max">
                  <thead>
                    <tr className="bg-gray-50 text-gray-500 text-xs uppercase border-b border-gray-200">
                      <th className="p-4 font-semibold whitespace-nowrap sticky left-0 bg-gray-50 z-10 shadow-[1px_0_0_0_#e5e7eb]">ID & Tanggal</th>
                      {activeFields.map(field => (
                        <th key={field.id} className="p-4 font-semibold whitespace-nowrap">{field.label}</th>
                      ))}
                      <th className="p-4 font-semibold whitespace-nowrap">Status Rekrutmen</th>
                    </tr>
                  </thead>

                  <tbody className="text-sm divide-y divide-gray-100">
                    {isLoadingData && (
                      <tr>
                        <td colSpan={activeFields.length + 2} className="p-8 text-center text-gray-500">Sedang mengambil data...</td>
                      </tr>
                    )}

                    {!isLoadingData && filteredApplicants.length === 0 && (
                      <tr>
                        <td colSpan={activeFields.length + 2} className="p-8 text-center text-gray-500">Data tidak ditemukan.</td>
                      </tr>
                    )}

                    {!isLoadingData && filteredApplicants.map((app, index) => {
                      const appId = app['ID Pelamar'];
                      const appStatus = app['Status'] || 'Baru';
                      const isUpdating = updatingIds[appId];

                      return (
                        <tr key={index} className="hover:bg-red-50 transition group">
                          <td className="p-4 whitespace-nowrap bg-white group-hover:bg-red-50 sticky left-0 z-10 shadow-[1px_0_0_0_#e5e7eb]">
                            <div className="font-bold text-gray-900">{appId || '-'}</div>
                            <div className="text-xs text-gray-500 mt-1">{app['Timestamp'] ? new Date(app['Timestamp']).toLocaleDateString('id-ID') : '-'}</div>
                          </td>

                          {activeFields.map(field => (
                            <td key={field.id} className="p-4 whitespace-nowrap">{renderDynamicCell(app, field)}</td>
                          ))}

                          <td className="p-4 whitespace-nowrap align-top">
                            <select 
                              value={appStatus}
                              onChange={(e) => handleStatusChange(app, e.target.value)}
                              disabled={isUpdating}
                              className={`w-full text-xs font-bold px-2 py-1.5 rounded border outline-none cursor-pointer transition-all duration-300 ${getStatusColorClass(appStatus)} ${isUpdating ? 'opacity-50 cursor-wait' : 'hover:shadow-sm'}`}
                            >
                              <option value="Baru">Baru</option>
                              <option value="Penilaian Cognitive">Penilaian Cognitive</option>
                              <option value="Selesai Test Kognitif">Selesai Test Kognitif</option>
                              <option value="Wawancara">Wawancara</option>
                              <option value="Sudah Wawancara">Sudah Wawancara</option>
                              <option value="Onboarding">Onboarding</option>
                              <option value="Active">Active</option>
                            </select>

                            {isUpdating && (
                              <div className="text-[10px] text-gray-400 mt-1 animate-pulse">Menyimpan...</div>
                            )}
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        );
      };

      const renderFormBuilder = () => (
        <div className="animate-[fadeIn_0.3s_ease-out]">
          <div className="flex justify-between items-center mb-8">
            <div>
              <h2 className="text-2xl font-bold">Form Adjustment</h2>
              <p className="text-sm text-gray-500">Atur kolom pendaftaran.</p>
            </div>
            <button onClick={handleSaveFormSettings} disabled={isSaving} className={`px-6 py-2.5 text-white font-bold rounded-lg ${isSaving ? 'bg-gray-400' : 'bg-red-600 hover:bg-red-700'}`}>
              {isSaving ? 'Menyimpan...' : '💾 Simpan Pengaturan'}
            </button>
          </div>

          <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
            {isLoadingSettings ? (
              <div className="text-center py-10 text-gray-500">Memuat pengaturan form...</div>
            ) : (
              <div className="space-y-4">
                <div className="hidden md:grid grid-cols-12 gap-4 px-4 py-2 bg-gray-50 rounded-lg text-xs font-bold text-gray-500 uppercase">
                  <div className="col-span-1 text-center">Status</div>
                  <div className="col-span-3">Label Form</div>
                  <div className="col-span-2">Tipe Input</div>
                  <div className="col-span-3">Options (Select)</div>
                  <div className="col-span-2 text-center">Wajib</div>
                  <div className="col-span-1 text-center">Aksi</div>
                </div>

                {formFields.map((field) => (
                  <div key={field.id} className={`grid grid-cols-1 md:grid-cols-12 gap-4 items-center p-4 rounded-lg border ${field.active ? 'border-gray-200 bg-white' : 'bg-gray-50 opacity-75'}`}>
                    <div className="col-span-1 flex justify-center">
                      <div className="relative w-10">
                        <input
                          type="checkbox"
                          checked={field.active}
                          onChange={(e) => handleUpdateField(field.id, 'active', e.target.checked)}
                          className="toggle-checkbox absolute w-5 h-5 rounded-full bg-white border-4 cursor-pointer z-10"
                          style={{
                            right: field.active ? '0' : '1.25rem',
                            borderColor: field.active ? '#10B981' : '#D1D5DB'
                          }}
                        />
                        <label className={`toggle-label block h-5 rounded-full ${field.active ? 'bg-green-500' : 'bg-gray-300'}`}></label>
                      </div>
                    </div>

                    <div className="col-span-3">
                      <input
                        type="text"
                        value={field.label}
                        onChange={(e) => handleUpdateField(field.id, 'label', e.target.value)}
                        className="w-full text-sm font-semibold border-b outline-none pb-1 bg-transparent"
                      />
                      <div className="text-[10px] text-gray-400 mt-1">Col: {field.name}</div>
                    </div>

                    <div className="col-span-2">
                      <select value={field.type} onChange={(e) => handleUpdateField(field.id, 'type', e.target.value)} className="w-full text-sm border rounded p-1.5 outline-none">
                        <option value="text">Teks Pendek</option>
                        <option value="textarea">Teks Panjang</option>
                        <option value="email">Email</option>
                        <option value="tel">Telepon</option>
                        <option value="url">Link / URL</option>
                        <option value="select">Dropdown</option>
                        <option value="file">Upload File</option>
                      </select>
                    </div>

                    <div className="col-span-3">
                      {field.type === 'select' ? (
                        <input
                          type="text"
                          value={field.options}
                          onChange={(e) => handleUpdateField(field.id, 'options', e.target.value)}
                          className="w-full text-xs border rounded p-1.5 outline-none"
                          placeholder="Pria, Wanita"
                        />
                      ) : (
                        <div className="text-xs text-gray-400 text-center">-</div>
                      )}
                    </div>

                    <div className="col-span-2 flex justify-center space-x-2">
                      <input
                        type="checkbox"
                        checked={field.required}
                        onChange={(e) => handleUpdateField(field.id, 'required', e.target.checked)}
                        className="w-4 h-4 text-red-600"
                      />
                      <label className="text-xs font-semibold text-gray-600 cursor-pointer" onClick={() => handleUpdateField(field.id, 'required', !field.required)}>Wajib</label>
                    </div>

                    <div className="col-span-1 flex justify-center">
                      <button onClick={() => handleDeleteField(field.id)} className="text-gray-400 hover:text-red-600 p-2 rounded-full hover:bg-red-50">🗑️</button>
                    </div>
                  </div>
                ))}

                <div className="pt-4 mt-4 border-t border-gray-100">
                  <button onClick={handleAddField} className="w-full py-3 border-2 border-dashed border-gray-300 text-gray-500 font-semibold rounded-xl hover:border-red-500 hover:text-red-500 flex justify-center">
                    ➕ Tambah Input Baru
                  </button>
                </div>
              </div>
            )}
          </div>
        </div>
      );

      const renderKognitifMaster = () => (
        <div className="animate-[fadeIn_0.3s_ease-out]">
          <div className="mb-6">
            <h2 className="text-2xl font-bold text-gray-800">Modul Penilaian Kognitif</h2>
            <p className="text-sm text-gray-500">Kelola soal ujian, atur standar kelulusan, dan pantau hasil tes kandidat.</p>
          </div>

          <div className="flex space-x-2 mb-8 bg-gray-200 p-1 rounded-xl inline-flex">
            <button onClick={() => setKognitifTab('soal')} className={`px-6 py-2 rounded-lg text-sm font-bold transition ${kognitifTab === 'soal' ? 'bg-white text-black shadow-sm' : 'text-gray-500 hover:text-black'}`}>🛠️ Custom Pertanyaan</button>
            <button onClick={() => setKognitifTab('grade')} className={`px-6 py-2 rounded-lg text-sm font-bold transition ${kognitifTab === 'grade' ? 'bg-white text-black shadow-sm' : 'text-gray-500 hover:text-black'}`}>🎯 Passing Grade</button>
            <button onClick={() => setKognitifTab('hasil')} className={`px-6 py-2 rounded-lg text-sm font-bold transition ${kognitifTab === 'hasil' ? 'bg-white text-black shadow-sm' : 'text-gray-500 hover:text-black'}`}>📊 Hasil Jawaban</button>
          </div>

          {kognitifTab === 'soal' && (
            <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
              <div className="flex justify-between items-center mb-6">
                <h3 className="text-lg font-bold">Daftar Soal Ujian</h3>
                <button onClick={handleSaveKognitif} disabled={isSavingKognitif} className={`px-4 py-2 text-white font-bold rounded-lg transition ${isSavingKognitif ? 'bg-gray-400' : 'bg-red-600 hover:bg-red-700'}`}>
                  {isSavingKognitif ? 'Menyimpan...' : '💾 Simpan Soal'}
                </button>
              </div>
              
              <div className="space-y-6">
                {isLoadingKognitif ? (
                  <div className="text-center py-10 text-gray-500">Memuat soal...</div>
                ) : (
                  kognitifQuestions.map((q, index) => (
                    <div key={q.id} className="bg-gray-50 p-6 rounded-xl border border-gray-200 relative group">
                      <button onClick={() => handleDeleteQuestion(q.id)} className="absolute top-4 right-4 text-gray-400 hover:text-red-600 p-2 bg-white rounded-full opacity-0 group-hover:opacity-100 transition shadow-sm">🗑️</button>
                      
                      <div className="flex gap-4 mb-4">
                        <div className="bg-black text-white w-8 h-8 rounded flex items-center justify-center font-bold shrink-0">{index + 1}</div>
                        <div className="w-full">
                          <textarea value={q.question} onChange={(e) => handleUpdateQuestion(q.id, 'question', e.target.value)} className="w-full border-gray-300 rounded-lg p-3 text-sm outline-none focus:border-red-500 resize-y" rows="2" placeholder="Masukkan soal di sini..."></textarea>
                        </div>
                      </div>

                      <div className="grid grid-cols-1 md:grid-cols-2 gap-4 bg-white p-4 rounded-lg border border-gray-100 ml-12 shadow-sm">
                        {['A', 'B', 'C', 'D'].map(opt => (
                          <div key={opt} className="flex gap-2 items-start">
                            <div className="w-full">
                              <label className="text-xs font-bold text-gray-600">Opsi {opt}</label>
                              <input type="text" value={q[`option${opt}`]} onChange={(e) => handleUpdateQuestion(q.id, `option${opt}`, e.target.value)} className="w-full mt-1 border border-gray-300 rounded p-2 text-sm outline-none" />
                            </div>
                            <div className="w-20 shrink-0">
                              <label className="text-xs font-bold text-gray-600">Skor</label>
                              <select value={q[`score${opt}`]} onChange={(e) => handleUpdateQuestion(q.id, `score${opt}`, parseInt(e.target.value))} className="w-full mt-1 border border-gray-300 rounded p-2 text-sm outline-none focus:border-red-500">
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                                <option value="4">4</option>
                              </select>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  ))
                )}

                {!isLoadingKognitif && (
                  <button onClick={handleAddQuestion} className="w-full py-4 border-2 border-dashed border-gray-300 text-gray-500 font-bold rounded-xl hover:border-red-500 hover:text-red-500 hover:bg-gray-50 transition flex justify-center items-center gap-2">
                    ➕ Tambah Soal Baru
                  </button>
                )}
              </div>
            </div>
          )}

          {kognitifTab === 'grade' && (
            <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200 max-w-2xl">
              <h3 className="text-lg font-bold mb-2">Atur Standar Kelulusan (%)</h3>
              <p className="text-sm text-gray-500 mb-6">Status kandidat (Terekomendasi / Sangat Direkomendasikan) akan dihitung otomatis oleh sistem berdasarkan persentase skor maksimal dari soal yang aktif.</p>
              
              <div className="space-y-6">
                <div className="bg-blue-50 p-4 rounded-xl border border-blue-100">
                  <label className="block text-sm font-bold text-blue-900 mb-2">Batas Bawah "Terekomendasi"</label>
                  <div className="flex items-center gap-3">
                    <input type="number" min="0" max="100" value={passingGrade.rekomen} onChange={(e) => setPassingGrade({...passingGrade, rekomen: e.target.value})} className="w-24 p-2 border border-blue-300 rounded-lg text-lg font-bold text-center outline-none" />
                    <span className="font-bold text-blue-900">%</span>
                  </div>
                  <p className="text-xs text-blue-700 mt-2">Kandidat dengan skor di bawah nilai ini otomatis berstatus <strong>"Tidak Cocok"</strong>.</p>
                </div>

                <div className="bg-green-50 p-4 rounded-xl border border-green-100">
                  <label className="block text-sm font-bold text-green-900 mb-2">Batas Bawah "Sangat Direkomendasikan"</label>
                  <div className="flex items-center gap-3">
                    <input type="number" min="0" max="100" value={passingGrade.sangatRekomen} onChange={(e) => setPassingGrade({...passingGrade, sangatRekomen: e.target.value})} className="w-24 p-2 border border-green-300 rounded-lg text-lg font-bold text-center outline-none" />
                    <span className="font-bold text-green-900">%</span>
                  </div>
                  <p className="text-xs text-green-700 mt-2">Kandidat dengan skor sama atau lebih besar dari nilai ini akan mendapat label prioritas utama.</p>
                </div>

                <button onClick={handleSavePassingGrade} disabled={isSavingGrade} className={`w-full py-3 text-white font-bold rounded-xl transition ${isSavingGrade ? 'bg-gray-400' : 'bg-black hover:bg-gray-900'}`}>
                  {isSavingGrade ? 'Menyimpan...' : 'Simpan Passing Grade'}
                </button>
              </div>
            </div>
          )}

          {kognitifTab === 'hasil' && (
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
              <div className="p-6 border-b flex justify-between items-center bg-gray-50">
                <h3 className="text-lg font-bold text-gray-800">Database Jawaban Pelamar</h3>
                <button onClick={fetchHasilJawaban} className="px-4 py-2 bg-black text-white text-sm font-semibold rounded hover:bg-red-600">Refresh Data</button>
              </div>

              <div className="overflow-x-auto pb-4 min-h-[300px]">
                <table className="w-full text-left border-collapse min-w-max">
                  <thead>
                    <tr className="bg-gray-50 text-gray-500 text-xs uppercase border-b border-gray-200">
                      {hasilHeaders.length > 0 ? (
                        hasilHeaders.map((header, idx) => (
                          <th key={idx} className={`p-4 font-semibold whitespace-nowrap ${idx === 0 ? 'sticky left-0 bg-gray-50 z-10 shadow-[1px_0_0_0_#e5e7eb]' : ''}`}>
                            {header}
                          </th>
                        ))
                      ) : (
                        <th className="p-4 font-semibold">Data Hasil Tes</th>
                      )}
                    </tr>
                  </thead>

                  <tbody className="text-sm divide-y divide-gray-100">
                    {isLoadingHasil && (
                      <tr>
                        <td colSpan="10" className="p-8 text-center text-gray-500">Memuat hasil tes...</td>
                      </tr>
                    )}

                    {!isLoadingHasil && hasilJawaban.length === 0 && (
                      <tr>
                        <td colSpan="10" className="p-8 text-center text-gray-500">Belum ada kandidat yang mensubmit tes.</td>
                      </tr>
                    )}
                    
                    {!isLoadingHasil && hasilJawaban.map((ans, idx) => (
                      <tr key={idx} className="hover:bg-red-50 transition">
                        {hasilHeaders.map((header, hIdx) => {
                          const val = ans[header];

                          if (header === 'Status Rekomendasi') {
                            return (
                              <td key={hIdx} className="p-4 whitespace-nowrap font-bold">
                                <span className={`px-2 py-1 rounded text-xs ${val === 'Sangat Direkomendasikan' ? 'bg-green-100 text-green-800' : val === 'Terekomendasi' ? 'bg-blue-100 text-blue-800' : 'bg-red-100 text-red-800'}`}>
                                  {val}
                                </span>
                              </td>
                            );
                          }

                          if (header === 'Total Score' || header === 'Persentase') {
                            return <td key={hIdx} className="p-4 whitespace-nowrap font-bold text-black">{val}</td>;
                          }

                          return (
                            <td key={hIdx} className={`p-4 whitespace-nowrap ${hIdx === 0 ? 'sticky left-0 bg-white shadow-[1px_0_0_0_#e5e7eb] font-bold' : ''}`}>
                              {val || '-'}
                            </td>
                          );
                        })}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </div>
      );

      const renderInterviewMaster = () => (
        <div className="animate-[fadeIn_0.3s_ease-out]">
          <div className="mb-6">
            <h2 className="text-2xl font-bold text-gray-800">Modul Penilaian Wawancara</h2>
            <p className="text-sm text-gray-500">Kelola pertanyaan dan lakukan live grading pada kandidat.</p>
          </div>

          <div className="flex space-x-2 mb-8 bg-gray-200 p-1 rounded-xl inline-flex">
            <button onClick={() => setInterviewTab('soal')} className={`px-6 py-2 rounded-lg text-sm font-bold transition ${interviewTab === 'soal' ? 'bg-white text-black shadow-sm' : 'text-gray-500 hover:text-black'}`}>🛠️ Custom Pertanyaan</button>
            <button onClick={() => setInterviewTab('penilaian')} className={`px-6 py-2 rounded-lg text-sm font-bold transition ${interviewTab === 'penilaian' ? 'bg-white text-black shadow-sm' : 'text-gray-500 hover:text-black'}`}>🎙️ Penilaian Langsung</button>
          </div>

          {interviewTab === 'soal' && (
            <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
              <div className="flex justify-between items-center mb-6">
                <h3 className="text-lg font-bold">Daftar Pertanyaan Wawancara</h3>
                <button onClick={handleSaveInterviewQs} disabled={isSavingInterview} className={`px-6 py-2 text-white font-bold rounded-lg shadow-md transition ${isSavingInterview ? 'bg-gray-400' : 'bg-blue-600 hover:bg-blue-700'}`}>
                  {isSavingInterview ? 'Menyimpan...' : '💾 Simpan Pertanyaan'}
                </button>
              </div>

              <div className="space-y-4">
                {isLoadingInterview ? (
                  <div className="text-center py-10 text-gray-500">Memuat data...</div>
                ) : (
                  interviewQuestions.map((q, index) => (
                    <div key={q.id} className="flex gap-4 items-center bg-gray-50 p-4 rounded-xl border border-gray-100 group">
                      <div className="bg-blue-600 text-white w-8 h-8 rounded-full flex items-center justify-center font-bold shrink-0">{index + 1}</div>
                      <input type="text" value={q.question} onChange={(e) => handleUpdateInterviewQ(q.id, e.target.value)} className="flex-1 bg-transparent border-b border-gray-300 focus:border-blue-600 outline-none px-2 py-1 text-sm font-medium" />
                      <button onClick={() => handleDeleteInterviewQ(q.id)} className="text-gray-400 hover:text-red-600 p-2 opacity-0 group-hover:opacity-100 transition">🗑️</button>
                    </div>
                  ))
                )}

                {!isLoadingInterview && (
                  <button onClick={handleAddInterviewQ} className="w-full py-4 border-2 border-dashed border-gray-300 text-gray-500 font-bold rounded-xl hover:border-blue-600 hover:text-blue-600 hover:bg-blue-50 transition">
                    ➕ Tambah Pertanyaan Wawancara
                  </button>
                )}
              </div>
            </div>
          )}

          {interviewTab === 'penilaian' && (
            <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
              <div className="p-6 border-b bg-gray-50">
                <h3 className="text-lg font-bold text-gray-800">Daftar Kandidat (Tahap Wawancara)</h3>
                <p className="text-xs text-gray-500 mt-1">Hanya menampilkan kandidat dengan status "Wawancara".</p>
              </div>

              <div className="overflow-x-auto">
                <table className="w-full text-left border-collapse min-w-max">
                  <thead>
                    <tr className="bg-gray-50 text-gray-500 text-xs uppercase border-b">
                      <th className="p-4 font-semibold">ID Pelamar</th>
                      <th className="p-4 font-semibold">Nama Kandidat</th>
                      <th className="p-4 font-semibold">Posisi</th>
                      <th className="p-4 font-semibold text-center">Skor Wawancara</th>
                      <th className="p-4 font-semibold text-center">Aksi Penilaian</th>
                    </tr>
                  </thead>

                  <tbody className="text-sm divide-y divide-gray-100">
                    {activeApplicants.filter(app => ['Wawancara', 'Sudah Wawancara', 'Onboarding', 'Active'].includes(app['Status'])).length === 0 ? (
                      <tr>
                        <td colSpan="5" className="p-10 text-center text-gray-500 font-medium">Belum ada kandidat di tahap wawancara saat ini.</td>
                      </tr>
                    ) : (
                      activeApplicants.filter(app => ['Wawancara', 'Sudah Wawancara', 'Onboarding', 'Active'].includes(app['Status'])).map((app, idx) => {
                        const appId = app['ID Pelamar'] || app.id;
                        const maxScore = interviewQuestions.length * 3;
                        const result = interviewResults.find(r => String(r.idPelamar).trim() === String(appId).trim());
                        const hasInterviewed = !!result;
                        const scoreText = hasInterviewed ? `${result.totalScore} / ${maxScore}` : '-';

                        return (
                          <tr key={idx} className="hover:bg-blue-50 transition">
                            <td className="p-4 font-bold text-gray-900">{appId || '-'}</td>
                            <td className="p-4 font-medium">{app['Nama'] || app.name || '-'}</td>
                            <td className="p-4">
                              <span className="bg-gray-100 text-gray-700 px-3 py-1 rounded-lg text-xs font-bold border">{app['Posisi'] || app.posisi || '-'}</span>
                            </td>
                            <td className="p-4 text-center font-black text-blue-700 text-base">{scoreText}</td>
                            <td className="p-4 text-center">
                              <button 
                                onClick={() => handleOpenGrading(app)} 
                                disabled={hasInterviewed || interviewQuestions.length === 0}
                                className={`px-5 py-2 text-white text-xs font-bold rounded-lg shadow-md transition transform ${hasInterviewed ? 'bg-gray-400 cursor-not-allowed' : interviewQuestions.length === 0 ? 'bg-gray-300 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700 hover:scale-105'}`}
                              >
                                {hasInterviewed ? 'Selesai ✅' : interviewQuestions.length === 0 ? 'Buat Soal Dulu' : 'Mulai Wawancara 🎙️'}
                              </button>
                            </td>
                          </tr>
                        );
                      })
                    )}
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </div>
      );

      const renderOnboardingMaster = () => (
        <div className="animate-[fadeIn_0.3s_ease-out]">
          <div className="mb-6">
            <h2 className="text-2xl font-bold text-gray-800">Management Onboarding</h2>
            <p className="text-sm text-gray-500">Kelola pasal perjanjian dan pantau status tanda tangan digital pelamar.</p>
          </div>
          
          <div className="flex space-x-2 mb-6 bg-gray-200 p-1 rounded-xl inline-flex">
            <button onClick={() => setOnboardingTab('editor')} className={`px-6 py-2 rounded-lg text-sm font-bold transition ${onboardingTab === 'editor' ? 'bg-white shadow-sm text-black' : 'text-gray-500 hover:text-black'}`}>📝 Editor Perjanjian</button>
            <button onClick={() => setOnboardingTab('status')} className={`px-6 py-2 rounded-lg text-sm font-bold transition ${onboardingTab === 'status' ? 'bg-white shadow-sm text-black' : 'text-gray-500 hover:text-black'}`}>✅ Status TTD</button>
          </div>

          {onboardingTab === 'editor' && (
            <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
              <div className="flex justify-between items-center mb-6">
                <h3 className="text-lg font-bold">Pasal Perjanjian Kerja</h3>
                <button onClick={() => {
                  const newClauses = [
                    ...clauses,
                    {
                      id: clauses.length + 1,
                      title: 'Judul Pasal Baru',
                      content: 'Isi pasal di sini...'
                    }
                  ];

                  setClauses(newClauses);
                }} className="text-blue-600 font-bold text-sm hover:underline">+ Tambah Pasal</button>
              </div>

              <div className="space-y-4">
                {clauses.map((c, i) => (
                  <div key={i} className="p-4 bg-gray-50 rounded-xl border border-gray-200 relative group">
                    <input value={c.title} onChange={(e) => {
                      const nc = [...clauses];
                      nc[i].title = e.target.value;
                      setClauses(nc);
                    }} className="w-full font-bold mb-3 p-2 border-b-2 border-gray-300 focus:border-blue-600 bg-transparent outline-none transition" placeholder="Judul Pasal" />

                    <textarea value={c.content} onChange={(e) => {
                      const nc = [...clauses];
                      nc[i].content = e.target.value;
                      setClauses(nc);
                    }} className="w-full text-sm p-2 bg-white border border-gray-200 rounded-lg outline-none focus:border-blue-600 h-24 resize-y transition" placeholder="Isi pasal..." />

                    <button onClick={() => {
                      setDialog({
                        isOpen: true,
                        type: 'confirm',
                        title: 'Hapus Pasal?',
                        message: 'Yakin ingin menghapus pasal ini?',
                        onConfirm: () => setClauses(clauses.filter((_, idx) => idx !== i))
                      });
                    }} className="absolute top-4 right-4 text-red-600 opacity-0 group-hover:opacity-100 transition p-2">🗑️</button>
                  </div>
                ))}

                <button onClick={async () => {
                  setIsSavingClause(true);

                  const res = await apiCall('saveOnboardingClauses', {
                    clauses
                  });

                  setIsSavingClause(false);

                  if (res.success) {
                    setDialog({
                      isOpen: true,
                      type: 'success',
                      title: 'Berhasil',
                      message: 'Template Perjanjian Tersimpan!'
                    });
                  } else {
                    setDialog({
                      isOpen: true,
                      type: 'alert',
                      title: 'Gagal',
                      message: res.message
                    });
                  }
                }} className={`w-full py-4 text-white font-bold rounded-xl transition shadow-md ${isSavingClause ? 'bg-gray-400' : 'bg-black hover:bg-gray-900'}`}>
                  {isSavingClause ? 'Menyimpan...' : '💾 Simpan Template Perjanjian'}
                </button>
              </div>
            </div>
          )}

          {onboardingTab === 'status' && (
            <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
              <div className="p-6 border-b bg-gray-50 flex justify-between items-center">
                <div>
                  <h3 className="text-lg font-bold text-gray-800">Status Penandatanganan Kontrak</h3>
                  <p className="text-xs text-gray-500 mt-1">Daftar kandidat yang telah menyetujui perjanjian onboarding.</p>
                </div>
                <button onClick={fetchOnboardingData} className="px-4 py-2 bg-black text-white text-sm font-semibold rounded hover:bg-red-600 transition">Refresh Data</button>
              </div>

              <div className="overflow-x-auto pb-4 min-h-[300px]">
                <table className="w-full text-left border-collapse min-w-max">
                  <thead>
                    <tr className="bg-gray-50 text-gray-500 text-xs uppercase border-b border-gray-200">
                      <th className="p-4 font-semibold">ID Pelamar</th>
                      <th className="p-4 font-semibold">Nama Tanda Tangan</th>
                      <th className="p-4 font-semibold">Waktu Disetujui</th>
                      <th className="p-4 font-semibold">Status</th>
                      <th className="p-4 font-semibold">Dokumen PDF</th>
                    </tr>
                  </thead>

                  <tbody className="text-sm divide-y divide-gray-100">
                    {signedList.length === 0 ? (
                      <tr>
                        <td colSpan="5" className="p-10 text-center text-gray-500 font-medium">Belum ada kandidat yang menandatangani kontrak.</td>
                      </tr>
                    ) : (
                      signedList.map((s, i) => (
                        <tr key={i} className="hover:bg-green-50 transition">
                          <td className="p-4 font-bold text-gray-900">{s[0]}</td>
                          <td className="p-4 font-medium text-gray-800">{s[1]}</td>
                          <td className="p-4 text-gray-500">{s[2] ? new Date(s[2]).toLocaleString('id-ID') : '-'}</td>
                          <td className="p-4">
                            <span className="bg-green-100 text-green-800 px-3 py-1 rounded-lg text-xs font-bold border border-green-200">
                              {s[3] || 'SIGNED'}
                            </span>
                          </td>
                          <td className="p-4">
                            {s[4] ? (
                              <a href={s[4]} target="_blank" className="inline-block px-4 py-1.5 bg-blue-600 text-white text-xs font-bold rounded-lg hover:bg-blue-700 shadow-sm transition">
                                Buka Dokumen 📄
                              </a>
                            ) : (
                              <span className="text-gray-400 italic text-xs">-</span>
                            )}
                          </td>
                        </tr>
                      ))
                    )}
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </div>
      );

      const renderRecapMaster = () => (
        <div className="animate-[fadeIn_0.3s_ease-out]">
          <div className="mb-8 border-b border-gray-200 pb-4">
            <h2 className="text-2xl font-black text-gray-900">Overall Assessment Recap 📊</h2>
            <p className="text-sm text-gray-500 mt-1">Rangkuman metrik nilai kandidat dari tahap Kognitif hingga Wawancara.</p>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            {activeApplicants.filter(a => ['Wawancara', 'Onboarding', 'Active'].includes(a['Status'])).length === 0 ? (
              <div className="col-span-full text-center py-10 bg-white rounded-2xl border border-dashed border-gray-300 text-gray-500 font-medium">Belum ada kandidat yang mencapai tahap evaluasi lanjutan.</div>
            ) : (
              activeApplicants.filter(a => ['Wawancara', 'Onboarding', 'Active'].includes(a['Status'])).map((app, idx) => {
                const appId = app['ID Pelamar'] || app.id;
                const kogResult = hasilJawaban.find(h => h['ID Pelamar'] === appId || h['Nama'] === app['Nama']);
                const kogScore = kogResult ? parseInt(kogResult['Persentase'] || kogResult['Total Score'] || 0) : 0;
                const intResult = interviewResults.find(r => String(r.idPelamar).trim() === String(appId).trim());
                const intScoreRaw = intResult ? parseInt(intResult.totalScore) : 0;
                const maxIntScore = interviewQuestions.length > 0 ? interviewQuestions.length * 3 : 1;
                const intPercentage = intResult ? Math.round((intScoreRaw / maxIntScore) * 100) : 0;
                const finalScore = Math.round((kogScore + intPercentage) / 2);

                return (
                  <div key={idx} className="bg-white rounded-2xl p-6 border border-gray-200 shadow-sm hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1 flex flex-col">
                    <div className="flex justify-between items-start mb-2">
                      <div>
                        <h3 className="font-black text-gray-900 text-lg line-clamp-1">{app['Nama'] || 'Kandidat'}</h3>
                        <p className="text-xs text-gray-500 mt-1">{appId} • <span className="font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded">{app['Posisi'] || '-'}</span></p>
                      </div>
                    </div>

                    <div className="flex justify-around items-center py-6 border-y border-gray-100 my-4 bg-gray-50 rounded-xl">
                      <CircularProgress percentage={kogScore} label="Kognitif" colorClass="text-purple-500" />
                      <CircularProgress percentage={intPercentage} label="Wawancara" colorClass="text-blue-500" />
                      <CircularProgress percentage={finalScore} label="Rata-rata" colorClass={finalScore >= 75 ? 'text-green-500' : finalScore >= 50 ? 'text-yellow-500' : 'text-red-500'} />
                    </div>

                    <div className="mt-auto pt-2">
                      <div className="flex items-center justify-between text-xs font-bold mb-3">
                        <span className="text-gray-500">Status Saat Ini:</span>
                        <span className={`px-3 py-1 rounded-full ${app['Status'] === 'Active' ? 'bg-green-100 text-green-700' : 'bg-gray-200 text-gray-700'}`}>{app['Status']}</span>
                      </div>
                      <button onClick={() => setSelectedDetail({ 
                        id: appId, 
                        title: `Detail Assessment: ${app['Nama']}`, 
                        content: `Rincian Nilai Kandidat:\n\n1. Nilai Kognitif: ${kogScore}%\n2. Nilai Wawancara: ${intScoreRaw}/${maxIntScore} (Setara ${intPercentage}%)\n\n🏆 RATA-RATA KESELURUHAN: ${finalScore}%` 
                      })} className="w-full py-3 bg-black hover:bg-red-600 text-white text-xs font-bold rounded-xl transition shadow-md">
                        Lihat Detail Analitik
                      </button>
                    </div>
                  </div>
                );
              })
            )}
          </div>
        </div>
      );

      return (
        <div className="min-h-screen flex bg-gray-100 overflow-hidden">
          <aside className={`bg-black text-white flex flex-col shadow-2xl z-20 transition-all duration-300 ease-in-out ${isSidebarOpen ? 'w-64' : 'w-0 overflow-hidden opacity-0 md:opacity-100 md:w-0'}`}>
            <div className="p-6 border-b border-gray-800 flex items-center space-x-3 w-64">
              <div className="w-10 h-10 bg-red-600 rounded flex items-center justify-center font-bold text-xl">A</div>
              <div>
                <h1 className="font-bold">ADMIN</h1>
                <p className="text-xs text-gray-400">Portal Rekrutmen</p>
              </div>
            </div>

            <nav className="flex-1 py-6 px-4 space-y-2 w-64">
              <button onClick={() => setActiveTab('dashboard')} className={`w-full text-left px-4 py-3 rounded-xl ${activeTab === 'dashboard' ? 'bg-red-600 text-white' : 'text-gray-400 hover:bg-gray-800'}`}>📊 Dashboard Utama</button>
              <button onClick={() => setActiveTab('form_builder')} className={`w-full text-left px-4 py-3 rounded-xl ${activeTab === 'form_builder' ? 'bg-red-600 text-white' : 'text-gray-400 hover:bg-gray-800'}`}>🛠️ Form Adjustment</button>
              <button onClick={() => setActiveTab('kognitif_builder')} className={`w-full text-left px-4 py-3 rounded-xl ${activeTab === 'kognitif_builder' ? 'bg-red-600 text-white' : 'text-gray-400 hover:bg-gray-800'}`}>🧠 Penilaian Kognitif</button>
              <button onClick={() => setActiveTab('interview')} className={`w-full text-left px-4 py-3 rounded-xl ${activeTab === 'interview' ? 'bg-red-600 text-white' : 'text-gray-400 hover:bg-gray-800'}`}>🗣️ Penilaian Wawancara</button>
              <button onClick={() => setActiveTab('onboarding')} className={`w-full text-left px-4 py-3 rounded-xl ${activeTab === 'onboarding' ? 'bg-red-600 text-white' : 'text-gray-400 hover:bg-gray-800'}`}>🤝 Onboarding</button>
              <button onClick={() => setActiveTab('recap')} className={`w-full text-left px-4 py-3 rounded-xl ${activeTab === 'recap' ? 'bg-red-600 text-white' : 'text-gray-400 hover:bg-gray-800'}`}>📈 Overall Recap</button>
            </nav>

            <div className="p-4 border-t border-gray-800 w-64">
              <button onClick={handleLogout} className="w-full py-3 bg-gray-900 hover:bg-red-600 rounded-xl text-sm font-bold">Keluar Sistem</button>
            </div>
          </aside>

          <div className="flex-1 flex flex-col h-screen overflow-hidden">
            <header className="bg-white border-b border-gray-200 py-4 px-6 flex justify-between items-center shadow-sm z-10">
              <div className="flex items-center">
                <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="mr-4 text-gray-600 hover:text-red-600 focus:outline-none transition transform hover:scale-110">
                  <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 12h16M4 18h16"></path>
                  </svg>
                </button>
                <h1 className="text-xl font-bold tracking-wide text-gray-800">HR PORTAL</h1>
              </div>
              <div className="flex items-center space-x-3">
                <span className="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center text-sm font-bold text-gray-600">HR</span>
              </div>
            </header>

            <div className="flex-1 overflow-y-auto p-4 md:p-8 w-full max-w-7xl mx-auto">
              {activeTab === 'dashboard' ? renderDashboard() : 
               activeTab === 'form_builder' ? renderFormBuilder() : 
               activeTab === 'kognitif_builder' ? renderKognitifMaster() : 
               activeTab === 'interview' ? renderInterviewMaster() : 
               activeTab === 'onboarding' ? renderOnboardingMaster() : 
               renderRecapMaster()}
            </div>
          </div>

          {selectedDetail && (
            <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-xl shadow-2xl w-full max-w-lg relative p-6">
                <button onClick={() => setSelectedDetail(null)} className="absolute top-4 right-4 text-gray-400 hover:text-red-600 font-bold text-xl transition">×</button>
                <h3 className="text-xl font-bold mb-1">{selectedDetail.title}</h3>
                <p className="text-sm text-gray-500 mb-4 border-b pb-2">ID: {selectedDetail.id}</p>
                <div className="bg-gray-50 p-4 rounded-lg border text-sm leading-relaxed whitespace-pre-wrap">{selectedDetail.content}</div>
              </div>
            </div>
          )}

          {interviewModal.isOpen && (
            <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6 animate-[fadeIn_0.2s_ease-out]">
                <div className="flex justify-between items-center mb-6 border-b pb-4">
                  <div>
                    <h3 className="text-xl font-bold text-gray-900">Atur Jadwal Wawancara</h3>
                    <p className="text-sm text-gray-500">Kandidat: <span className="font-bold text-black">{interviewModal.app['Nama'] || 'Kandidat'}</span></p>
                  </div>
                  <button onClick={() => setInterviewModal({...interviewModal, isOpen: false})} className="text-gray-400 hover:text-red-600 font-bold text-2xl">×</button>
                </div>

                <div className="space-y-4">
                  <div>
                    <label className="block text-xs font-bold uppercase text-gray-500 mb-2">Format Wawancara</label>
                    <div className="flex space-x-4">
                      <label className={`flex-1 py-3 px-4 border rounded-xl cursor-pointer font-bold text-sm flex items-center justify-center gap-2 transition ${interviewModal.type === 'online' ? 'bg-blue-50 border-blue-500 text-blue-700' : 'bg-gray-50 border-gray-200 text-gray-500 hover:bg-gray-100'}`}>
                        <input type="radio" name="intType" checked={interviewModal.type === 'online'} onChange={() => setInterviewModal({...interviewModal, type: 'online'})} className="hidden" />
                        🌐 Online
                      </label>
                      <label className={`flex-1 py-3 px-4 border rounded-xl cursor-pointer font-bold text-sm flex items-center justify-center gap-2 transition ${interviewModal.type === 'offline' ? 'bg-green-50 border-green-500 text-green-700' : 'bg-gray-50 border-gray-200 text-gray-500 hover:bg-gray-100'}`}>
                        <input type="radio" name="intType" checked={interviewModal.type === 'offline'} onChange={() => setInterviewModal({...interviewModal, type: 'offline'})} className="hidden" />
                        🏢 Offline
                      </label>
                    </div>
                  </div>

                  <div>
                    <label className="block text-xs font-bold uppercase text-gray-500 mb-1">Tanggal & Waktu</label>
                    <input type="datetime-local" value={interviewModal.datetime} onChange={(e) => setInterviewModal({...interviewModal, datetime: e.target.value})} className="w-full border border-gray-300 rounded-lg p-2.5 text-sm outline-none focus:border-red-500" required />
                  </div>

                  <div>
                    <label className="block text-xs font-bold uppercase text-gray-500 mb-1">
