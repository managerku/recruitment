                      {interviewModal.type === 'online' ? 'Link Google Meet / Zoom' : 'Alamat Lengkap Kantor'}
                    </label>
                    <textarea 
                      value={interviewModal.location} 
                      onChange={(e) => setInterviewModal({...interviewModal, location: e.target.value})} 
                      className="w-full border border-gray-300 rounded-lg p-2.5 text-sm outline-none focus:border-red-500 resize-none" 
                      rows="3" 
                      placeholder={interviewModal.type === 'online' ? 'https://meet.google.com/xxx-xxxx-xxx' : 'Jl. Sudirman No. 123, Gedung Indah Lantai 4...'} 
                      required 
                    ></textarea>
                  </div>
                </div>

                <div className="mt-8 flex gap-3">
                  <button onClick={() => setInterviewModal({...interviewModal, isOpen: false})} className="flex-1 py-3 bg-gray-100 text-gray-800 font-bold rounded-xl hover:bg-gray-200 transition">Batal</button>
                  <button onClick={handleSendInterview} className="flex-1 py-3 bg-black text-white font-bold rounded-xl hover:bg-red-600 transition shadow-md">
                    Simpan & Kirim WA
                  </button>
                </div>
              </div>
            </div>
          )}

          {gradingModal.isOpen && (
            <div className="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl flex flex-col max-h-[90vh] animate-[fadeIn_0.2s_ease-out]">
                <div className="p-6 border-b flex justify-between items-center bg-blue-50 rounded-t-2xl">
                  <div>
                    <h3 className="text-xl font-bold text-blue-900">Form Penilaian Wawancara</h3>
                    <p className="text-sm text-blue-700">Kandidat: <span className="font-bold">{gradingModal.app['Nama'] || 'Kandidat'}</span></p>
                  </div>
                  <button onClick={() => setGradingModal({ isOpen: false, app: null, answers: {} })} className="text-blue-400 hover:text-blue-800 font-bold text-2xl">×</button>
                </div>
                
                <div className="p-6 overflow-y-auto flex-1 space-y-6">
                  {interviewQuestions.map((q, idx) => (
                    <div key={q.id} className="border-b pb-4 last:border-0">
                      <p className="font-bold text-gray-800 mb-3 text-sm">{idx + 1}. {q.question}</p>
                      <div className="flex gap-2">
                        <button onClick={() => handleScoreChange(q.id, 1)} className={`flex-1 py-2 rounded-lg text-xs font-bold border transition ${gradingModal.answers[q.id] === 1 ? 'bg-red-500 text-white border-red-500 shadow-inner' : 'bg-white text-gray-600 hover:bg-gray-50 border-gray-300'}`}>1 - Tidak Relevan</button>
                        <button onClick={() => handleScoreChange(q.id, 2)} className={`flex-1 py-2 rounded-lg text-xs font-bold border transition ${gradingModal.answers[q.id] === 2 ? 'bg-yellow-500 text-white border-yellow-500 shadow-inner' : 'bg-white text-gray-600 hover:bg-gray-50 border-gray-300'}`}>2 - Relevan</button>
                        <button onClick={() => handleScoreChange(q.id, 3)} className={`flex-1 py-2 rounded-lg text-xs font-bold border transition ${gradingModal.answers[q.id] === 3 ? 'bg-green-500 text-white border-green-500 shadow-inner' : 'bg-white text-gray-600 hover:bg-gray-50 border-gray-300'}`}>3 - Sangat Relevan</button>
                      </div>
                    </div>
                  ))}
                </div>

                <div className="p-6 border-t bg-gray-50 rounded-b-2xl flex gap-4">
                  <div className="flex-1 flex items-center justify-between px-4 bg-white rounded-xl border border-gray-200">
                    <span className="text-xs font-bold text-gray-500 uppercase">Total Skor Sementara</span>
                    <span className="text-xl font-black text-blue-600">{Object.values(gradingModal.answers).reduce((a, b) => Number(a) + Number(b), 0)}</span>
                  </div>
                  <button onClick={handleSubmitGrading} disabled={isSubmittingGrade} className={`px-8 py-3 text-white font-bold rounded-xl transition shadow-md ${isSubmittingGrade ? 'bg-gray-400' : 'bg-blue-600 hover:bg-blue-700'}`}>
                    {isSubmittingGrade ? 'Menyimpan...' : 'Simpan Nilai'}
                  </button>
                </div>
              </div>
            </div>
          )}

          {dialog.isOpen && (
            <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-[60] p-4">
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6 text-center animate-[fadeIn_0.2s_ease-out]">
                <div className={`w-16 h-16 rounded-full mx-auto mb-4 flex items-center justify-center text-3xl ${dialog.type === 'confirm' ? 'bg-yellow-100 text-yellow-600' : dialog.type === 'success' ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}`}>
                  {dialog.type === 'confirm' ? '❓' : dialog.type === 'success' ? '✅' : '⚠️'}
                </div>
                <h3 className="text-xl font-bold mb-2 text-gray-900">{dialog.title}</h3>
                <p className="text-gray-600 mb-6 text-sm">{dialog.message}</p>
                <div className="flex justify-center gap-3">
                  {dialog.type === 'confirm' && (
                    <button onClick={() => setDialog({ ...dialog, isOpen: false })} className="px-5 py-2 bg-gray-100 text-gray-800 font-bold rounded-xl hover:bg-gray-200 transition">Batal</button>
                  )}
                  <button onClick={() => {
                    const confirmAction = dialog.onConfirm;
                    setDialog({
                      ...dialog,
                      isOpen: false
                    });

                    if (confirmAction) confirmAction();
                  }} className="px-5 py-2 bg-black text-white font-bold rounded-xl hover:bg-gray-800 transition shadow-md">
                    {dialog.type === 'confirm' ? 'Ya, Lanjutkan' : 'Tutup'}
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AdminDashboard />);
  </script>
</body>
</html>
