<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; background-color: #fcfcfc; }
  </style>
</head>

<body class="text-gray-900 antialiased">
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useEffect } = React;

    // =====================================================
    // CONFIG API GAS
    // Ganti dengan URL deployment Apps Script lu yang berakhiran /exec
    // =====================================================
    const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbxMJLyiR-tYGsm8BVYfjTiZQNIf-umqVsjvHNYJAHnSMGip9pbTQxdvU2M1bbph4009Ug/exec';

    // Nama file route lokal GitHub
    const INDEX_PAGE = 'index.html';

    // =====================================================
    // API HELPER UNTUK FRONTEND GITHUB
    // Semua request ke Code.gs doPost lewat helper ini.
    // Content-Type text/plain dipakai supaya aman dari preflight CORS.
    // =====================================================
    async function apiCall(action, payload = {}) {
      try {
        const response = await fetch(GAS_API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'text/plain;charset=utf-8'
          },
          body: JSON.stringify({
            action,
            payload
          })
        });

        const text = await response.text();

        try {
          return JSON.parse(text);
        } catch (parseError) {
          return {
            success: false,
            message: 'Response server bukan JSON valid: ' + text
          };
        }

      } catch (error) {
        return {
          success: false,
          message: 'Gagal terhubung ke server: ' + error.message
        };
      }
    }

    function goToPage(pageName) {
      const currentPath = window.location.pathname;
      const basePath = currentPath.substring(0, currentPath.lastIndexOf('/') + 1);
      window.location.href = window.location.origin + basePath + pageName;
    }

    function PelamarDashboard() {
      // STATE UMUM
      const [idPelamar, setIdPelamar] = useState('');
      const [applicantStatus, setApplicantStatus] = useState('');
      const [isLoading, setIsLoading] = useState(true);
      const [dialog, setDialog] = useState({
        isOpen: false,
        type: 'alert',
        title: '',
        message: '',
        onConfirm: null
      });
      const [view, setView] = useState('dashboard'); // 'dashboard', 'kognitif_test', 'onboarding_contract', 'onboarding_success'

      // STATE KOGNITIF
      const [isTakingTest, setIsTakingTest] = useState(false);
      const [timeLeft, setTimeLeft] = useState(1800); 
      const [questions, setQuestions] = useState([]);
      const [answers, setAnswers] = useState({});
      const [isFinished, setIsFinished] = useState(false);
      const [hasSubmittedTest, setHasSubmittedTest] = useState(false);

      // STATE ONBOARDING
      const [clauses, setClauses] = useState([]);
      const [signName, setSignName] = useState('');
      const [isAgreementChecked, setIsAgreementChecked] = useState(false);

      useEffect(() => {
        const savedId = localStorage.getItem('id_pelamar_aktif');

        if (!savedId) {
          alert('Sesi tidak valid. Silakan login kembali.');
          goToPage(INDEX_PAGE);
          return;
        }

        const loginTime = Number(localStorage.getItem('pelamar_login_time') || 0);
        const now = Date.now();
        const sessionMaxAge = 12 * 60 * 60 * 1000;

        // Backward-compatible:
        // kalau index.html lama belum nyimpan pelamar_login_time, session tetap diizinkan.
        // kalau timestamp tersedia dan sudah lebih dari 12 jam, session dianggap expired.
        if (loginTime && (now - loginTime > sessionMaxAge)) {
          localStorage.removeItem('id_pelamar_aktif');
          localStorage.removeItem('pelamar_login_time');
          alert('Sesi pelamar sudah berakhir. Silakan login kembali.');
          goToPage(INDEX_PAGE);
          return;
        }

        setIdPelamar(savedId);
        fetchInitialData(savedId);
      }, []);

      // MENGAMBIL STATUS PELAMAR DULU
      const fetchInitialData = async (id) => {
        setIsLoading(true);

        const res = await apiCall('verifyPelamarLogin', {
          idPelamar: id
        });

        if (res.success) {
          setApplicantStatus(res.status);

          if (res.status === 'Penilaian Cognitive') {
            await fetchQuestions();
          } else if (res.status === 'Onboarding') {
            await fetchOnboardingClauses();
          } else {
            setIsLoading(false);
          }
        } else {
          setIsLoading(false);

          setDialog({
            isOpen: true,
            type: 'alert',
            title: 'Sesi Tidak Valid',
            message: res.message || 'ID Pelamar tidak valid. Silakan login kembali.',
            onConfirm: () => {
              localStorage.removeItem('id_pelamar_aktif');
              localStorage.removeItem('pelamar_login_time');
              goToPage(INDEX_PAGE);
            }
          });
        }
      };

      // FUNGSI FETCH KOGNITIF
      const fetchQuestions = async () => {
        const res = await apiCall('getKognitifQuestions');

        if (res.success) {
          setQuestions(res.data);
        } else {
          setDialog({
            isOpen: true,
            type: 'alert',
            title: 'Gagal Memuat Soal',
            message: res.message
          });
        }

        setIsLoading(false);
      };

      // FUNGSI FETCH ONBOARDING CLAUSES
      const fetchOnboardingClauses = async () => {
        const res = await apiCall('getOnboardingClauses');

        if (res.success) {
          setClauses(res.data);
        } else {
          setDialog({
            isOpen: true,
            type: 'alert',
            title: 'Gagal Memuat Kontrak',
            message: res.message
          });
        }

        setIsLoading(false);
      };

      // LOGIKA KOGNITIF
      const handleAnswerChange = (questionId, answerValue) => {
        setAnswers({
          ...answers,
          [questionId]: answerValue
        });
      };

      const executeSubmitTest = async () => {
        if (hasSubmittedTest) return;

        setHasSubmittedTest(true);
        setIsLoading(true);

        const res = await apiCall('submitKognitif', {
          idPelamar,
          answers
        });

        setIsLoading(false);

        if (res.success) {
          setIsFinished(true);
          setIsTakingTest(false);
          setApplicantStatus('Selesai Test Kognitif');
          
          setDialog({ 
            isOpen: true, 
            type: 'success', 
            title: 'Tes Selesai! 🎉', 
            message: 'Jawaban Anda telah tersimpan. Silakan kembali ke dashboard untuk melihat status selanjutnya.',
            onConfirm: () => {
              setIsTakingTest(false);
              setView('dashboard');
            }
          });
        } else {
          setHasSubmittedTest(false);
          setDialog({
            isOpen: true,
            type: 'alert',
            title: 'Gagal',
            message: res.message
          });
        }
      };

      useEffect(() => {
        let timer = null;

        if (isTakingTest && timeLeft > 0) {
          timer = setInterval(() => {
            setTimeLeft(prev => prev - 1);
          }, 1000);
        } else if (timeLeft === 0 && isTakingTest) {
          setIsTakingTest(false);

          setDialog({
            isOpen: true,
            type: 'alert',
            title: 'Waktu Habis!',
            message: 'Waktu pengerjaan selesai. Jawaban Anda dikirim otomatis.'
          });

          executeSubmitTest();
        }

        return () => clearInterval(timer);
      }, [isTakingTest, timeLeft]);

      const startTest = () => {
        if (questions.length === 0) {
          setDialog({
            isOpen: true,
            type: 'alert',
            title: 'Soal Belum Tersedia',
            message: 'Soal ujian belum tersedia. Silakan hubungi admin.'
          });
          return;
        }

        setDialog({
          isOpen: true,
          type: 'confirm',
          title: 'Mulai Tes?',
          message: 'Waktu 30 menit akan berjalan dan tidak dapat di-pause. Pastikan koneksi stabil. Mulai sekarang?',
          onConfirm: () => {
            setIsTakingTest(true);
            setView('kognitif_test');
          }
        });
      };

      const handleSubmitTest = () => {
        const unanswered = questions.filter(q => !answers[q.id]);

        if (unanswered.length > 0) {
          setDialog({
            isOpen: true,
            type: 'alert',
            title: 'Jawaban Belum Lengkap',
            message: `Masih ada ${unanswered.length} soal yang belum dijawab. Harap lengkapi semua jawaban sebelum mengumpulkan.`
          });
          return;
        }

        setDialog({
          isOpen: true,
          type: 'confirm',
          title: 'Kumpulkan Jawaban?',
          message: 'Anda yakin ingin mengumpulkan jawaban sekarang? Anda tidak dapat mengulang tes ini.',
          onConfirm: () => executeSubmitTest()
        });
      };

      const formatTime = (seconds) => {
        const m = Math.floor(seconds / 60).toString().padStart(2, '0');
        const s = (seconds % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
      };

      // LOGIKA ONBOARDING SUBMIT
      const handleSignContract = () => {
        if (!isAgreementChecked) {
          setDialog({
            isOpen: true,
            type: 'alert',
            title: 'Peringatan',
            message: 'Anda harus menyetujui pasal-pasal perjanjian dengan mencentang kotak persetujuan.'
          });
          return;
        }

        if (!signName.trim()) {
          setDialog({
            isOpen: true,
            type: 'alert',
            title: 'Peringatan',
            message: 'Anda harus mengetikkan Nama Lengkap Anda sebagai tanda tangan.'
          });
          return;
        }

        setDialog({
          isOpen: true,
          type: 'confirm',
          title: 'Konfirmasi Tanda Tangan',
          message: 'Dengan mengirimkan persetujuan ini, Anda mengikatkan diri pada kontrak kerja secara digital. Lanjutkan?',
          onConfirm: async () => {
            setIsLoading(true);

            const res = await apiCall('submitOnboardingSignature', {
              idPelamar,
              fullName: signName
            });

            setIsLoading(false);

            if (res.success) {
              setApplicantStatus('Active');

              setDialog({ 
                isOpen: true,
                type: 'success',
                title: 'Selamat!', 
                message: 'Persetujuan kontrak berhasil direkam. Anda sekarang resmi menjadi bagian dari perusahaan kami.',
                onConfirm: () => setView('onboarding_success')
              });
            } else {
              setDialog({
                isOpen: true,
                type: 'alert',
                title: 'Gagal',
                message: res.message
              });
            }
          }
        });
      };

      const handleBackToHome = () => {
        localStorage.removeItem('id_pelamar_aktif');
        localStorage.removeItem('pelamar_login_time');
        goToPage(INDEX_PAGE);
      };

      // RENDER LAYAR UTAMA
      return (
        <div className="max-w-4xl mx-auto py-10 px-6 relative">
          <header className="mb-10 text-center border-b pb-6">
            <h1 className="text-3xl font-extrabold text-black mb-2">Portal Kandidat</h1>
            <p className="text-gray-500 font-medium">
              ID Pelamar Anda: <span className="font-bold text-red-600">{idPelamar}</span>
            </p>

            {applicantStatus && (
              <p className="text-sm mt-2 font-bold text-gray-700 bg-gray-100 inline-block px-3 py-1 rounded">
                Status: {applicantStatus}
              </p>
            )}
          </header>

          {/* LOADING SCREEN */}
          {isLoading && view === 'dashboard' ? (
            <div className="text-center py-20 text-gray-500 font-semibold animate-pulse">
              Memuat dashboard...
            </div>
          ) : (
            <React.Fragment>
              {/* VIEW 1: DASHBOARD PEMILIHAN MENU */}
              {view === 'dashboard' && (
                <div className="bg-white p-8 rounded-2xl shadow-sm border text-center">
                  <h2 className="text-2xl font-bold mb-4 text-gray-800">Dashboard Anda</h2>

                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mt-8">
                    {/* TOMBOL UJIAN KOGNITIF */}
                    <button 
                      onClick={startTest} 
                      disabled={applicantStatus !== 'Penilaian Cognitive' || isFinished}
                      className={`p-6 rounded-2xl border-2 flex flex-col items-center gap-3 transition ${
                        applicantStatus === 'Penilaian Cognitive' && !isFinished
                          ? 'border-red-600 bg-red-50 hover:bg-red-100 cursor-pointer shadow-md transform hover:-translate-y-1'
                          : 'bg-gray-50 border-gray-200 opacity-60 cursor-not-allowed'
                      }`}
                    >
                      <span className="text-4xl">🧠</span>
                      <span className="font-bold text-gray-900 text-lg">Ujian Kognitif</span>
                      <span className={`text-xs font-bold px-2 py-1 rounded ${
                        isFinished ? 'text-blue-700 bg-blue-100' : 'text-gray-500'
                      }`}>
                        {isFinished
                          ? 'Menunggu hasil kognitif untuk tahap Signing Contract ⏳'
                          : applicantStatus === 'Penilaian Cognitive'
                            ? 'Tersedia: Silakan Kerjakan'
                            : 'Sudah Selesai / Belum Tersedia'
                        }
                      </span>
                    </button>

                    {/* TOMBOL ONBOARDING KONTRAK */}
                    <button 
                      onClick={async () => {
                        if (clauses.length === 0) {
                          setIsLoading(true);
                          await fetchOnboardingClauses();
                        }
                        setView('onboarding_contract');
                      }}
                      disabled={applicantStatus !== 'Onboarding'}
                      className={`p-6 rounded-2xl border-2 flex flex-col items-center gap-3 transition ${
                        applicantStatus === 'Onboarding'
                          ? 'border-green-600 bg-green-50 hover:bg-green-100 cursor-pointer shadow-md transform hover:-translate-y-1'
                          : 'bg-gray-50 border-gray-200 opacity-60 cursor-not-allowed'
                      }`}
                    >
                      <span className="text-4xl">🤝</span>
                      <span className="font-bold text-gray-900 text-lg">Perjanjian Onboarding</span>
                      <span className="text-xs text-gray-500 font-medium">
                        {applicantStatus === 'Onboarding'
                          ? 'Tersedia: Tinjau Kontrak Anda'
                          : 'Belum Tersedia'
                        }
                      </span>
                    </button>
                  </div>

                  <div className="mt-8 pt-6 border-t border-gray-100">
                    <button
                      onClick={handleBackToHome}
                      className="text-sm font-bold text-gray-500 hover:text-red-600 transition"
                    >
                      Keluar dari Portal Kandidat
                    </button>
                  </div>
                </div>
              )}

              {/* VIEW 2: LAYAR UJIAN KOGNITIF */}
              {view === 'kognitif_test' && (
                <div className={`animate-[fadeIn_0.5s_ease-out] transition-all duration-500 ${
                  isFinished ? 'blur-md pointer-events-none select-none opacity-50' : ''
                }`}>
                  <div className="sticky top-0 bg-white p-4 shadow-md rounded-xl border border-red-200 mb-8 flex justify-between items-center z-40">
                    <span className="font-bold text-gray-700">Sisa Waktu</span>
                    <span className={`text-2xl font-black tracking-widest ${
                      timeLeft < 300 ? 'text-red-600 animate-pulse' : 'text-black'
                    }`}>
                      {formatTime(timeLeft)}
                    </span>
                  </div>

                  <div className="space-y-8">
                    {questions.map((q, idx) => (
                      <div key={q.id} className="bg-white p-6 rounded-xl border shadow-sm">
                        <p className="font-bold text-lg mb-4 text-gray-800">
                          <span className="text-red-600 mr-2">{idx + 1}.</span> {q.question}
                        </p>

                        <div className="space-y-3 pl-6">
                          {['A', 'B', 'C', 'D'].map(opt => {
                            const optText = q[`option${opt}`];

                            if (!optText) return null;

                            return (
                              <label key={opt} className="flex items-center space-x-3 cursor-pointer p-3 rounded-lg hover:bg-gray-50 border border-transparent hover:border-gray-200 transition">
                                <input
                                  type="radio"
                                  name={`question_${q.id}`}
                                  value={optText}
                                  onChange={() => handleAnswerChange(q.id, optText)}
                                  className="w-4 h-4 text-red-600 cursor-pointer"
                                />
                                <span className="text-gray-700 font-medium">{optText}</span>
                              </label>
                            );
                          })}
                        </div>
                      </div>
                    ))}
                  </div>

                  <button
                    onClick={handleSubmitTest}
                    disabled={isLoading || hasSubmittedTest}
                    className={`mt-10 w-full py-4 text-white font-bold rounded-xl shadow-lg transition ${
                      isLoading || hasSubmittedTest ? 'bg-gray-400' : 'bg-black hover:bg-gray-900'
                    }`}
                  >
                    {isLoading || hasSubmittedTest ? 'MEMPROSES...' : 'KUMPULKAN JAWABAN'}
                  </button>
                </div>
              )}

              {/* VIEW 3: LAYAR KONTRAK ONBOARDING */}
              {view === 'onboarding_contract' && (
                <div className="bg-white p-8 rounded-2xl shadow-sm border max-w-3xl mx-auto animate-[fadeIn_0.5s_ease-out]">
                  <div className="flex justify-between items-center mb-6 border-b pb-4">
                    <button
                      onClick={() => setView('dashboard')}
                      className="text-xs font-bold text-gray-500 hover:text-red-600 transition"
                    >
                      ← Kembali
                    </button>
                    <h2 className="text-2xl font-black text-gray-900 text-center flex-1">SURAT PERJANJIAN KERJA</h2>
                    <div className="w-16"></div>
                  </div>
                  
                  <div className="space-y-6 max-h-96 overflow-y-auto mb-8 p-6 bg-gray-50 rounded-xl border border-gray-200 text-sm leading-relaxed text-gray-700">
                    {clauses.length === 0 ? (
                      <p className="text-center italic">Memuat pasal perjanjian...</p>
                    ) : (
                      clauses.map((c, i) => (
                        <div key={i} className="mb-4">
                          <h4 className="font-bold text-black text-base mb-1">Pasal {i + 1}: {c.title}</h4>
                          <p className="whitespace-pre-wrap">{c.content}</p>
                        </div>
                      ))
                    )}
                  </div>

                  <div className="border-t pt-6 bg-blue-50 p-6 rounded-xl border border-blue-100">
                    <label className="flex items-start gap-3 mb-6 cursor-pointer group">
                      <input
                        type="checkbox"
                        checked={isAgreementChecked}
                        onChange={(e) => setIsAgreementChecked(e.target.checked)}
                        className="mt-1 w-5 h-5 text-blue-600 rounded cursor-pointer"
                      />
                      <span className="text-sm font-semibold text-blue-900 group-hover:text-black">
                        Dengan mencentang kotak ini, saya menyatakan telah membaca, memahami, dan menyetujui seluruh pasal yang tercantum di atas tanpa paksaan dari pihak mana pun.
                      </span>
                    </label>
                    
                    <div className="mb-4">
                      <label className="block text-xs font-bold uppercase text-gray-600 mb-2">
                        Tanda Tangan Digital (Ketik Nama Lengkap Anda)
                      </label>
                      <input 
                        type="text" 
                        placeholder="Contoh: Budi Santoso" 
                        value={signName} 
                        onChange={(e) => setSignName(e.target.value)} 
                        className="w-full p-4 border-2 border-gray-300 rounded-xl outline-none focus:border-blue-600 font-bold text-gray-900" 
                      />
                    </div>

                    <button 
                      onClick={handleSignContract} 
                      disabled={isLoading}
                      className={`w-full py-4 text-white font-black rounded-xl shadow-md transition transform ${
                        isLoading
                          ? 'bg-gray-400'
                          : 'bg-green-600 hover:bg-green-700 hover:-translate-y-1'
                      }`}
                    >
                      {isLoading ? 'MEMPROSES...' : 'KIRIM PERSETUJUAN KONTRAK'}
                    </button>
                  </div>
                </div>
              )}

              {/* VIEW 5: SELESAI ONBOARDING */}
              {view === 'onboarding_success' && (
                <div className="bg-white p-10 rounded-3xl shadow-sm border text-center animate-[fadeIn_0.5s_ease-out] max-w-2xl mx-auto mt-10">
                  <div className="w-24 h-24 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
                    <span className="text-5xl">🎊</span>
                  </div>

                  <h2 className="text-3xl font-black mb-4 text-green-700">Terima Kasih!</h2>

                  <p className="text-gray-600 max-w-lg mx-auto leading-relaxed mb-8">
                    Proses penandatanganan kontrak digital telah selesai. Dokumen legal Anda sudah tersimpan aman di sistem kami. Selamat bergabung dan sampai jumpa di hari pertama kerja!
                  </p>

                  <button
                    onClick={handleBackToHome}
                    className="w-full sm:w-auto px-8 py-4 bg-black hover:bg-gray-900 text-white font-bold rounded-xl shadow-md transition transform hover:-translate-y-1"
                  >
                    Kembali ke Halaman Awal
                  </button>
                </div>
              )}
            </React.Fragment>
          )}
          
          {/* KOMPONEN MODAL POP-UP CUSTOM */}
          {dialog.isOpen && (
            <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6 text-center animate-[fadeIn_0.2s_ease-out]">
                <div className={`w-16 h-16 rounded-full mx-auto mb-4 flex items-center justify-center text-3xl ${
                  dialog.type === 'confirm'
                    ? 'bg-yellow-100 text-yellow-600'
                    : dialog.type === 'success'
                      ? 'bg-green-100 text-green-600'
                      : 'bg-red-100 text-red-600'
                }`}>
                  {dialog.type === 'confirm' ? '❓' : dialog.type === 'success' ? '✅' : '⚠️'}
                </div>

                <h3 className="text-xl font-bold mb-2 text-gray-900">{dialog.title}</h3>
                <p className="text-gray-600 mb-6 text-sm whitespace-pre-wrap">{dialog.message}</p>

                <div className="flex justify-center gap-3">
                  {dialog.type === 'confirm' && (
                    <button
                      onClick={() => setDialog({ ...dialog, isOpen: false })}
                      className="px-5 py-2 bg-gray-100 text-gray-800 font-bold rounded-xl hover:bg-gray-200 transition"
                    >
                      Batal
                    </button>
                  )}

                  <button
                    onClick={() => {
                      const confirmAction = dialog.onConfirm;

                      setDialog({
                        ...dialog,
                        isOpen: false
                      });

                      if (confirmAction) confirmAction();
                    }}
                    className="px-5 py-2 bg-black text-white font-bold rounded-xl hover:bg-gray-800 transition shadow-md"
                  >
                    {dialog.type === 'confirm' ? 'Ya, Lanjutkan' : 'Tutup'}
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<PelamarDashboard />);
  </script>
</body>
</html>
